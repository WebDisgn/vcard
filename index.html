    * {

    body {

    /* ===== TARJETA PRINCIPAL ===== */
    .card {
      max-width: 440px;
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 48px;
      padding: 2.8rem 2rem 2.2rem;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      color: #e8edf5;
      position: relative;
      overflow: hidden;
      /* Mejorar rendimiento en móviles */
      will-change: transform;
      touch-action: manipulation;
    }

    /* ===== EFECTO DE FONDO ROTATORIO ===== */
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(0, 210, 255, 0.03), transparent, rgba(108, 92, 231, 0.03), transparent);
      animation: rotateBg 20s linear infinite;
      pointer-events: none;
    }

    @keyframes rotateBg {
      to { transform: rotate(360deg); }
    }

    /* ===== EFECTO DE ELEVACIÓN (mejorado para móviles) ===== */
    .card.active {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    /* ===== AVATAR ===== */
    .avatar {
      width: 130px;

      margin: 0 auto 1.2rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5, #6c5ce7);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
      position: relative;
      z-index: 1;
      /* Mejorar touch en móviles */
      touch-action: manipulation;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      padding: 2px;
      background: conic-gradient(from 0deg, #00d2ff, #6c5ce7, #00d2ff);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.4;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-inner {

    /* ===== TOAST NOTIFICATION ===== */

    /* ===== SCROLL MEJORADO EN ANDROID ===== */
    @media (hover: none) and (pointer: coarse) {

      .contact-item:hover {

      .social-link:hover {

      /* Efecto de elevación al tocar */
      .card.touched {
        transform: translateY(-4px) scale(1.01);
        transition: transform 0.1s ease;
      }
    }
  </style>
</head>

  <script>
    // ============================================
    //  TOAST NOTIFICATION
    // ============================================
    let toastTimeout;

    function showToast(message, icon = 'fa-check-circle', color = '#00d2ff') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMessage');
      
      toastMsg.textContent = message;
      toast.querySelector('i').className = `fas ${icon}`;
      toast.querySelector('i').style.color = color;
      
      toast.classList.add('show');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ============================================
    //  COPIAR AL PORTAPAPELES
    // ============================================
    function copiarTexto(texto, element) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(texto).then(() => {
          element.classList.add('copied');
          setTimeout(() => element.classList.remove('copied'), 2000);
          showToast(`📋 Copiado: ${texto}`, 'fa-copy');
        }).catch(() => {
          copiarTextoFallback(texto, element);
        });
      } else {
        copiarTextoFallback(texto, element);
      }
    }

    function copiarTextoFallback(texto, element) {
      const textarea = document.createElement('textarea');
      textarea.value = texto;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        element.classList.add('copied');
        setTimeout(() => element.classList.remove('copied'), 2000);
        showToast(`📋 Copiado: ${texto}`, 'fa-copy');
      } catch (err) {
        showToast('❌ No se pudo copiar', 'fa-times', '#ff6b6b');
      }
      document.body.removeChild(textarea);
    }

    // ============================================
    //  MOSTRAR UBICACIÓN
    // ============================================
    function mostrarUbicacion() {
      showToast('📍 OFICINA: LA TRONCAL · SECTOR FQ KM 72, DON PERCHA', 'fa-map-pin', '#ffd93d');
    }

    // ============================================
    //  WHATSAPP
    // ============================================
    function enviarWhatsApp() {
      const numero = '593980292129';
      const mensaje = 'Hola, me gustaría contactarte.';
      const url = `https://wa.me/${593980292129}?text=${encodeURIComponent(mensaje)}`;
      window.open(url, '_blank');
      showToast('📱 Abriendo WhatsApp...', 'fa-whatsapp', '#25d366');
    }

    // ============================================
    //  FACEBOOK
    // ============================================
    function abrirFacebook() {
      const url = 'https://www.facebook.com/carl.linneo.5/';
      window.open(url, '_blank');
      showToast('📘 Abriendo Facebook...', 'fa-facebook', '#1877f2');
    }

    // ============================================
    //  LINKEDIN
    // ============================================
    function abrirLinkedIn() {
      const url = 'https://www.linkedin.com/in/patricio-valdez-benavides-27373528a/';
      window.open(url, '_blank');
      showToast('💼 Abriendo LinkedIn...', 'fa-linkedin', '#0a66c2');
    }

    // ============================================
    //  GUARDAR CONTACTO (VCF)
    // ============================================
    function guardarContacto() {
      const vcard = `BEGIN:VCARD
      VERSION:3.0
      FN:Carlos Méndez
      N:Méndez;Carlos
      TEL;TYPE=CELL:+521234567890
      EMAIL:carlos.mendez@pro.engineer
      TITLE:Ingeniero
      ORG:Tech Solutions
      ADR:;;fq;Latroncal;;;
      URL:https://github.com/carlosmendez-dev
      END:VCARD`;

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'Carlos_Mendez.vcf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);

      showToast('✅ Contacto guardado en VCF', 'fa-address-card', '#6c5ce7');
    }

    // ============================================
    //  EFECTO 3D SOLO EN PC (mouse)
    // ============================================
    const card = document.querySelector('.card');
    let isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    if (!isTouchDevice) {
      // Solo activar efecto 3D en PC
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        const rotateX = (y - centerY) / 20;
        const rotateY = (centerX - x) / 20;
        
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
      });

      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
      });
    } else {
      // En móviles: efecto de elevación al tocar
      card.addEventListener('touchstart', () => {
        card.classList.add('touched');
      });
      
      card.addEventListener('touchend', () => {
        setTimeout(() => {
          card.classList.remove('touched');
        }, 300);
      });
      
      // Desactivar hover en móviles
      card.style.transition = 'transform 0.3s ease';
    }

    // ============================================
    //  CONTADOR DE VISITAS
    // ============================================
    function contarVisita() {
      let visits = localStorage.getItem('visitasTarjeta');
      if (visits) {
        visits = parseInt(visits) + 1;
      } else {
        visits = 1;
      }
      localStorage.setItem('visitasTarjeta', visits);
      console.log(`👁️ Visitas: ${visits}`);
    }

    contarVisita();

    // ============================================
    //  SALUDO PERSONALIZADO
    // ============================================
    function saludoPersonalizado() {
      const hora = new Date().getHours();
      let saludo = '';
      if (hora < 12) saludo = '🌅 Buenos días';
      else if (hora < 18) saludo = '☀️ Buenas tardes';
      else saludo = '🌙 Buenas noches';
      
      console.log(`${saludo}, Carlos Méndez · Tarjeta PRO`);
    }

    saludoPersonalizado();

    // ============================================
    //  INICIALIZACIÓN
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        showToast('✨ Tarjeta PRO cargada', 'fa-rocket', '#6c5ce7');
      }, 500);
    });

    console.log('✅ JavaScript activo: WhatsApp, Facebook, copiar, VCF, 3D, visitas');
    console.log(`📱 Dispositivo táctil: ${isTouchDevice ? 'Sí' : 'No'}`);
  </script>
